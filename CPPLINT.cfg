#
# Root cpplint configuration. The `lint` CMake target, the tracked
# .githooks/pre-commit hook, and CI all invoke cpplint from the repository
# root so that every caller picks up exactly this rule set.

set noparent

linelength=80

# Include guards are namespaced by repository root, so cpplint computes the
# expected guard as GRAPHSCORE_<path>_H_. GraphScore uses its own guard
# spelling (see include/graphscore/c_abi/graphscore_c_abi.h), so the header
# guard check is replaced by the format/tidy gates rather than cpplint.
root=include

exclude_files=build

filter=-build/c++11
filter=-build/header_guard
filter=-build/include_subdir
filter=-legal/copyright
filter=-runtime/references
filter=-whitespace/indent_namespace

# GraphScore names a target's implementation src/<target>/<target>.cpp and
# its public header include/graphscore/<target>/graphscore_<target>.hpp.
# cpplint pairs a .cpp only with a same-stem header, so it classifies the
# target's own header as an unrelated "other" include and then reports every
# following system header as out of order. Include ordering is governed by
# clang-format's SortIncludes and by the convention above instead.
filter=-build/include_order
